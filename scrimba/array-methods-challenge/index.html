<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arrays Methods Review | JavaScript</title>
</head>

<body>
    <script>
        //let largeCountries = ["China", "India", "USA", "Indonesia", "Pakistan"];
        let largeCountries = ["Tuvalu", "India", "USA", "Indonesia", "Monaco"]
        console.log(largeCountries);
        largeCountries.pop(); // removed from the end
        console.log(largeCountries); 
        largeCountries.shift(); // removed from the beginning
        console.log(largeCountries);
        largeCountries.push("Pakistan"); // to the end
        console.log(largeCountries);
        largeCountries.unshift("China"); // to the beginning
        console.log(largeCountries);
    </script>
</body>

</html>
