<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Building a String Transformer App Using JavaScript</title>
</head>
<body>
    <script>
        const originalString = "I love cats.";
        console.log("Original string:");
        console.log(originalString);

        const replacedString = originalString.replace("cats", "dogs");
        console.log("After using the replace() method:");
        console.log(replacedString);

        const exampleSentence = "I love cats and and cats are so much fun!";
        console.log("Original string:");
        console.log(exampleSentence);

        const dogsOnlySentence = exampleSentence.replaceAll("cats", "dogs");
        console.log("Replacing all occurences of cats with dogs:");
        console.log(dogsOnlySentence);

        const learningSentence = "I love learning!";
        console.log("Original learning sentence:");
        console.log(learningSentence);

        const repeatedLove = "love ".repeat(3).trimEnd();
        console.log(repeatedLove);

        const newSentence = `I ${repeatedLove} learning!`;
        console.log(newSentence);

        
    </script>
</body>
</html>
