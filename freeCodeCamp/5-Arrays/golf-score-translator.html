<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Building a Golf Score Translator Using JavaScript</title>
</head>

<body>
    <script>
        const name = ["Hole-in-one!", "Eagle", "Birdie", "Par", "Bogey", "Double Bogey", "Go Home!"];

        function golfScore(par, strokes) {
            if (strokes === 1) {
                return "Hole-in-one!";
            }
            if (strokes <= par - 2) {
                return "Eagle";
            }
            if (strokes === par - 1) {
                return "Birdie";
            }
            if (strokes === par) {
                return "Par";
            }

            if (strokes === par + 1) {
                return "Bogey";
            }

            if (strokes === par + 2) {
                return "Double Bogey";
            }

            if (strokes >= par + 3) {
                return "Go Home!";
            }
        }
    </script>
</body>

</html>
