<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Implement a Unique Sorted Union with JavaScript</title>
</head>

<body>
    <script>
        function uniteUnique(...arr) {
            // add all arrays together into one single array
            // remove duplicate entries from that array
            const resultArray = [];
            const flatArray = resultArray.concat(...arr);
            let resultSet = new Set(flatArray);
            return [...resultSet];
        }
        console.log(uniteUnique([1, 3, 2], [5, 2, 1, 4], [2, 1]));
        console.log(uniteUnique([1, 2, 3], [5, 2, 1]));
        console.log(uniteUnique([1, 2, 3], [5, 2, 1, 4], [2, 1], [6, 7, 8]));
        console.log(uniteUnique([1, 3, 2], [5, 4], [5, 6]));
        console.log(uniteUnique([1, 3, 2, 3], [5, 2, 1, 4], [2, 1]));
    </script>
</body>

</html>
