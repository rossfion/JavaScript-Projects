<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Build an Odd Fibonacci Sum Calculator</title>
</head>

<body>
    <script>
        function sumFibs(num) {
            // 0 1 1 2 3 5 8
            let a = 1;
            let b = 1;
            let sum = a;
            // b is always going to be greater than a
            while (b <= num) {
                if (b % 2 !== 0) {
                    sum += b;
                }

                let tempNum = b;
                b = a + b;
                a = tempNum;
            }
            return sum;

        }
        console.log(sumFibs(1));
        console.log(sumFibs(1000));
        console.log(sumFibs(4000000));
        console.log(sumFibs(4));
        console.log(sumFibs(75024));
        console.log(sumFibs(75025));
    </script>
</body>

</html>
