<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARIA Accessibility Exercise | Custom Checkbox Control Demo Using Aria-Checked</title>
    <style>
        [role="checkbox"] {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-family: system-ui, sans-serif;
            font-size: 1rem;
            cursor: pointer;
            user-select: none;
            color: #222;
        }

        [role="checkbox"]::before {
            content: "";
            display: inline-block;
            width: 1rem;
            height: 1rem;
            border: 2px solid #666;
            border-radius: 4px;
            background-color: #fff;
            transition: all 0.2s ease;
            box-sizing: border-box;
        }

        [role="checkbox"]:hover::before {
            border-color: #0078d4;
        }

        [role="checkbox"]:focus::before {
            outline: 2px solid #0078d4;
            outline-offset: 2px;
        }

        [role="checkbox"][aria-checked="true"]::before {
            background-color: #0078d4;
            border-color: #0078d4;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 14 14'><path fill='white' d='M5.2 10.4L2 7.2l1.1-1.1 2.1 2.1L10.9 2.5 12 3.6z'/></svg>");
            background-repeat: no-repeat;
            background-position: center;
        }

        [role="checkbox"][aria-disabled="true"] {
            opacity: 0.5;
            pointer-events: none;
            cursor: not-allowed;
        }
    </style>
</head>

<body>
    <div role="checkbox" aria-checked="true" tabindex="0">Checkbox</div>
    <script>

    </script>
</body>

</html>
