<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Button Accessibility Exercise</title>
    <style>
        button {
            background-color: #0078d4;
            color: white;
            padding: 8px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background-color: #005ea2;
        }

        ul {
            list-style: none;
            padding: 0;
            margin: 8px 0 0;
            border: 1px solid #ccc;
            border-radius: 4px;
            width: 150px;
            background: #fff;
            /* additional info for aria-owns demo */
            position: absolute;
            z-index: 10;
        }

        li {
            padding: 8px;
            cursor: pointer;
        }

        li:hover {
            background-color: #f2f2f2;
        }
    </style>
</head>

<body>
    <!-- <button id="menuButton" aria-expanded="false" aria-controls="menuList">Menu</button> -->
    <button aria-owns="menu1" aria-expanded="true" aria-controls="menuList">Menu</button>
    <main>
        <!-- an entire page worth of content -->
    </main>

    <!-- <ul id="menuList" hidden>
        <li>List Item One</li>
        <li>List Item Two</li>
    </ul> -->
    <!-- demo of aria-owns -->
    <ul id="menu1">
        <li>List Item One</li>
        <li>List Item Two</li>
    </ul>
    <script>
        // const button = document.getElementById("menuButton");
        // const menu = document.getElementById("menuList");
        // const button = document.querySelector("button");
        // const menu = document.getElementById(button.getAttribute('aria-controls'));
        const button = document.querySelector("button");
        const menu = document.getElementById(button.getAttribute('aria-owns'));

        button.addEventListener("click", () => {
            const expanded = button.getAttribute("aria-expanded") === "true";
            button.setAttribute("aria-expanded", String(!expanded));
            menu.hidden = expanded;
        });

        // aria-owns additional code
        // Clear the menu if the user clicks outside
        document.addEventListener("click", (e) => {
            if (!button.contains(e.target) && !menu.contains(e.target)) {
                button.setAttribute("aria-expanded", "false");
                menu.hidden = true;
            }
        });
    </script>
</body>

</html>
