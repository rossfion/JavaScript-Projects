<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Building a Fortune Teller Using JavaScript</title>
</head>

<body>
    <script>
        const fortune1 = "Your cat will look very cuddly today.";
        const fortune2 = "The weather will be nice tomorrow.";
        const fortune3 = "Be cautious with your new neighbors.";
        const fortune4 = "You will find a new hobby soon.";
        const fortune5 = "It would be nice to avoid the color red today.";

        const randomNumber = Math.floor(Math.random() * (5 - 1) + 1);

        let selectedFortune = randomNumber;

        if (randomNumber == 1) {
            selectedFortune = fortune1;
            console.log(selectedFortune);
        } else if (randomNumber == 2) {
            selectedFortune = fortune2;
            console.log(selectedFortune);
        } else if (randomNumber == 3) {
            selectedFortune = fortune3;
            console.log(selectedFortune);
        } else if (randomNumber == 4) {
            selectedFortune = fortune4;
            console.log(selectedFortune);
        } else if (randomNumber == 5) {
            selectedFortune = fortune5;
            console.log(selectedFortune);
        }

    </script>
</body>

</html>
