<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Building a Card Counting Assistant Using JavaScript</title>
</head>

<body>
    <script>
        let count = 0;
        function cc(card) {
            switch (card) {
                case 2:
                case 3:
                case 4:
                case 5:
                case 6:
                    count++;
                    break;
                case 10:
                case 'J':
                case 'Q':
                case 'K':
                case 'A':
                    count--;
                    break;

            }
            if (count > 0) {
                return count + " Bet";
            } else {
                return count + " Hold";
            }
        }
        console.log(cc(2), cc(5), cc(4), cc("J"));
    </script>
</body>

</html>
