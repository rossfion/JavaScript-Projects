<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Building a Leap Year Calculator Using JavaScript</title>
</head>

<body>
    <script>

        let year = true;
        function isLeapYear(year) {
            if (year % 4 === 0) {
                if (year % 100 === 0) {
                    if (year % 400 === 0) {
                        return year + " is a leap year.";
                    } else {
                        return year + " is not a leap year.";
                    }
                } else {
                    return year + " is a leap year.";
                }
            } else {
                return year + " is not a leap year.";
            }

        }
        let result = isLeapYear(year);
        console.log(result);
        console.log(result);

    </script>
</body>

</html>
