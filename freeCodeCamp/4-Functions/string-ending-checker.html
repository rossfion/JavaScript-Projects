<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Implementing a String Ending Checker Function Using JavaScript</title>
</head>

<body>
    <script>
        function confirmEnding(firstString, secondString) {
            const endString = firstString.slice(firstString.length - secondString.length);
            if (secondString === endString) {
                //console.log(true);
                return true;
            } else {
                //console.log(false);
                return false;
            }
        }
        console.log(confirmEnding("Bastian", "n"));
        console.log(confirmEnding("Connor", "n"));
        console.log(confirmEnding("Walking on water and developing software from a specification are easy if both are frozen", "specification"));
        console.log(confirmEnding("He has to give me a new name", "name"));
        console.log(confirmEnding("Open sesame", "same"));
        console.log(confirmEnding("Open sesame", "sage"));
        console.log(confirmEnding("Open sesame", "game"));
        console.log(confirmEnding("If you want to save our world, you must hurry. We don't know how much longer we can withstand the nothing", "mountain"));
        console.log(confirmEnding("Abstraction", "action"));

    </script>
</body>

</html>
