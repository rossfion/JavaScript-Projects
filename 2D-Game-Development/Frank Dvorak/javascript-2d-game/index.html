<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript 2D Game | Built With HTML5 Canvas, CSS, and Vanilla JavaScript</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <canvas id="canvas1"></canvas>
    <img src="./images/player.png" alt="player sprite" id="player">
    <img src="./images/citylayer-1.png" alt="" id="cityLayer1">
    <img src="./images/citylayer-2.png" alt="" id="cityLayer2">
    <img src="./images/citylayer-3.png" alt="" id="cityLayer3">
    <img src="./images/citylayer-4.png" alt="" id="cityLayer4">
    <img src="./images/citylayer-5.png" alt="" id="cityLayer5">
    <img src="./images/enemy_fly.png" alt="" id="enemy_fly">
    <img src="./images/enemy_plant.png" alt="" id="enemy_plant">
    <img src="./images/enemy_spider_big.png" alt="" id="enemy_spider_big">
    <img src="./images/fire.png" alt="" id="fire">
    <img src="./images/boom.png" alt="" id="collisionAnimation">
    <script type="module" src="./main.js"></script>

</html>
