<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript 2D Game | Built With HTML5 Canvas, CSS, and Vanilla JavaScript</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Creepster&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <canvas id="canvas1"></canvas>
    <img src="./images/player.png" alt="player sprite" id="player">
    <img src="./images/forestlayer-1.png" alt="" id="forestlayer1">

    <img src="./images/enemy_spider_big.png" alt="" id="enemy_spider_big">
